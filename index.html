<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MULTICRIC Support</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:url('https://images.unsplash.com/photo-1540747913346-19e32dc3e97e?q=80&w=1600') center center/cover no-repeat;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.65);
}

.card{
    position:relative;
    z-index:2;
    width:90%;
    max-width:520px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(10px);
    border-radius:24px;
    padding:30px;
    text-align:center;
    color:#fff;
    border:1px solid rgba(255,255,255,.15);
}

.logo{
    font-size:42px;
    font-weight:900;
    color:#ffc400;
    margin-bottom:15px;
    letter-spacing:2px;
}

h1{
    margin-bottom:15px;
    font-size:30px;
}

p{
    line-height:1.7;
    color:#e5e5e5;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:16px 30px;
    background:#25D366;
    color:#fff;
    text-decoration:none;
    border-radius:50px;
    font-size:18px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    background:#1ebe5d;
    transform:scale(1.05);
}

.features{
    margin-top:25px;
    text-align:left;
}

.features div{
    background:rgba(255,255,255,.08);
    padding:12px;
    margin-bottom:10px;
    border-radius:12px;
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="card">

<div class="logo">ICE</div>

<h1>Contact Our Support Team</h1>

<p>
Get assistance, information, and answers to your questions from our support team.
</p>

<a class="btn"
href="https://wa.me/+447546796844?text=Hello%20ICE%2C%20I%20would%20like%20more%20information.">
Contact on WhatsApp
</a>

<div class="features">
    <div>✅ Fast Support</div>
    <div>✅ Easy Assistance</div>
    <div>✅ Community Updates</div>
    <div>✅ User Guidance</div>
</div>

</div>

</body>
</html>
